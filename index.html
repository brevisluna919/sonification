<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Sonification Suite: browser-based HTML apps that turn maps, stars and sea-state data into sound." />
  <meta name="keywords" content="sonification, generative music, Web Audio API, MIDI, wavetable, map to midi, sky to midi, hydroacoustic synthesis" />
  <meta name="author" content="Ruben Silva" />

  <meta property="og:title" content="Sonification Suite" />
  <meta property="og:description" content="Maps become melodies. Stars become phrases. The sea becomes a waveform." />
  <meta property="og:type" content="website" />

  <title>Sonification Suite</title>

  <style>
    :root {
      --ink: #f5f2e8;
      --muted: rgba(245, 242, 232, 0.72);
      --line: rgba(245, 242, 232, 0.52);
      --deep: #06120d;
      --shadow: rgba(0, 0, 0, 0.48);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      color: var(--ink);
      font-family: "Courier New", Courier, monospace;
      background:
        radial-gradient(circle at 74% 14%, rgba(240, 255, 205, 0.18) 0 2px, transparent 3px),
        radial-gradient(circle at 22% 28%, rgba(225, 255, 185, 0.12), transparent 26%),
        radial-gradient(circle at 80% 68%, rgba(80, 120, 62, 0.36), transparent 32%),
        linear-gradient(115deg, rgba(0,0,0,0.58), rgba(0,0,0,0.08) 46%, rgba(0,0,0,0.66)),
        linear-gradient(180deg, #08150e 0%, #18331f 47%, #07120d 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(90deg, transparent 0 72px, rgba(255,255,255,0.025) 73px, transparent 74px),
        repeating-linear-gradient(0deg, transparent 0 72px, rgba(255,255,255,0.018) 73px, transparent 74px);
      opacity: 0.65;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 38% 78%, rgba(185, 220, 150, 0.16), transparent 22%),
        radial-gradient(circle at 52% 35%, rgba(255,255,255,0.08), transparent 1px),
        radial-gradient(circle at 64% 18%, rgba(255,255,255,0.08), transparent 1px);
      filter: blur(0.2px);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .frame {
      width: min(980px, 100%);
      min-height: min(720px, calc(100vh - 56px));
      border: 1px solid var(--line);
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: rgba(0, 0, 0, 0.08);
      box-shadow: 0 28px 90px var(--shadow);
      backdrop-filter: blur(1.4px);
    }

    header,
    footer {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: var(--muted);
    }

    footer {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: center;
      text-align: center;
    }

    .mark {
      color: var(--ink);
      font-size: 22px;
      letter-spacing: -6px;
      margin-right: 12px;
    }

    .brand,
    .meta {
      display: flex;
      align-items: center;
      gap: 14px;
      white-space: nowrap;
    }

    .hero {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: clamp(32px, 6vw, 62px);
      padding: clamp(38px, 8vw, 90px) clamp(22px, 5vw, 72px);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-family: Impact, "Arial Narrow", "Helvetica Neue Condensed Bold", sans-serif;
      font-size: clamp(64px, 14vw, 158px);
      line-height: 0.82;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      text-shadow: 0 12px 42px rgba(0,0,0,0.5);
    }

    .subtitle {
      max-width: 760px;
      margin: 20px auto 0;
      color: var(--muted);
      font-size: clamp(14px, 1.5vw, 18px);
      line-height: 1.6;
    }

    .apps {
      width: min(760px, 100%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .app {
      min-height: 132px;
      border: 1px solid var(--line);
      display: grid;
      align-content: center;
      gap: 10px;
      padding: 20px;
      background: rgba(0,0,0,0.08);
      transition: background 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    .app:hover,
    .app:focus-visible {
      background: rgba(245,242,232,0.10);
      border-color: var(--ink);
      transform: translateY(-2px);
      outline: none;
    }

    .number {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.22em;
    }

    .name {
      font-size: clamp(18px, 2vw, 26px);
      line-height: 1.08;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    @media (max-width: 760px) {
      main {
        padding: 12px;
      }

      .frame {
        min-height: calc(100vh - 24px);
      }

      header {
        align-items: flex-start;
        flex-direction: column;
        justify-content: center;
        padding: 16px;
      }

      .meta {
        font-size: 10px;
      }

      .apps {
        grid-template-columns: 1fr;
      }

      .app {
        min-height: 104px;
      }

      footer {
        padding: 18px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="frame" aria-label="Sonification Suite landing page">
      <header>
        <div class="brand">
          <span class="mark" aria-hidden="true">≋</span>
          <span>Browser-based HTML apps</span>
        </div>
        <div class="meta">
          <span>v1.0.0</span>
          <span>2026-06-16</span>
        </div>
      </header>

      <div class="hero">
        <div>
          <h1>Sonification<br>Suite</h1>
          <p class="subtitle">Maps become melodies. Stars become phrases. The sea becomes a waveform.</p>
        </div>

        <nav class="apps" aria-label="Select an app">
          <a class="app" href="./map-to-midi/">
            <span class="number">01</span>
            <span class="name">Map → MIDI</span>
            <span class="hint">Open app</span>
          </a>

          <a class="app" href="./sky-to-midi/">
            <span class="number">02</span>
            <span class="name">Sky → MIDI</span>
            <span class="hint">Open app</span>
          </a>

          <a class="app" href="./your-daily-wavetable/">
            <span class="number">03</span>
            <span class="name">Your Daily<br>Wavetable</span>
            <span class="hint">Open app</span>
          </a>
        </nav>
      </div>

      <footer>
        Observe. Sonify. Reflect.
      </footer>
    </section>
  </main>
</body>
</html>
