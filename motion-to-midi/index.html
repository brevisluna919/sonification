const srcVideo = $('#srcVideo');
let webcamStream=null;

function syncModeToggle(){
  const wrap = $('#modeToggle'); if(!wrap) return;
  const btns = wrap.querySelectorAll('.toggle button');
  if(btns.length===2){
    const isVid = state.mode==='video';
    btns[0].classList.toggle('on', !isVid);
    btns[1].classList.toggle('on', isVid);
  }
}
function clearCamStatus(){ const n=$('#camStatus'); if(n){ n.style.display='none'; n.innerHTML=''; } }
function setCamStatus(title, body, withVideoBtn){
  const n=$('#camStatus'); if(!n) return;
  n.innerHTML='';
  n.append(el('div','cs-title',title));
  n.append(el('div','cs-body',body));
  if(withVideoBtn){
    const b = el('button',null,'Upload a video instead');
    b.onclick = () => {
      state.mode='video';
      syncModeToggle();
      switchMode();
      $('#videoFile').click();
    };
    n.append(b);
  }
  n.style.display='';
}

function switchMode(){
  const cam = $('#camWrap'), vid = $('#vidWrap');
  if(state.mode==='webcam'){ cam.style.display=''; vid.style.display='none'; startWebcam(); }
  else { cam.style.display='none'; vid.style.display=''; stopWebcam(); clearCamStatus(); }
}
async function startWebcam(deviceId){
  stopWebcam();
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    setCamStatus('Camera unavailable here',
      'This preview frame does not expose a camera. Open the app in its own browser tab (or download the file and open it) to use the camera, or upload a video to try it right now.', true);
    return;
  }
  try{
    let video;
    if(deviceId){ video = {deviceId:{exact:deviceId}}; }
    else if(IS_MOBILE){ video = {facingMode:{ideal: state.facing}, width:{ideal:1280}, height:{ideal:720}}; }
    else { video = {width:1280, height:720}; }
    const constraints = { video, audio:false };
    webcamStream = await navigator.mediaDevices.getUserMedia(constraints);
    clearCamStatus();
    srcVideo.srcObject = webcamStream; srcVideo.loop=false; srcVideo.play();
    listCameras();
    startEngine(true); // begin live sonification the moment the camera is live
  }catch(e){
    const name = e && e.name ? e.name : '';
    if(name==='NotAllowedError' || name==='SecurityError'){
      // Either the user blocked it, or (common in an embedded preview) a
      // Permissions-Policy on the parent frame forbids camera access.
      const embedded = (window.self !== window.top);
      setCamStatus(embedded ? 'Camera blocked in preview' : 'Camera permission needed',
        embedded
          ? 'The in-chat preview frame does not allow camera access. Open the app in its own browser tab (or download and open it) to use the camera. You can upload a video to try it right here.'
          : 'Allow camera access in your browser, then switch the Camera control again. You can also upload a video instead.',
        true);
    } else if(name==='NotFoundError' || name==='OverconstrainedError'){
      // Retry once with a plain video:true before giving up.
      if(!deviceId){
        try{
          webcamStream = await navigator.mediaDevices.getUserMedia({video:true, audio:false});
          clearCamStatus();
          srcVideo.srcObject = webcamStream; srcVideo.loop=false; srcVideo.play();
          listCameras(); startEngine(true); return;
        }catch(e2){}
      }
      setCamStatus('No camera found',
        'No camera is available on this device. Upload a video to drive the instrument instead.', true);
    } else if(name==='NotReadableError'){
      setCamStatus('Camera in use',
        'Another app is using the camera. Close it and switch the Camera control again, or upload a video instead.', true);
    } else {
      setCamStatus('Camera could not start',
        'The camera could not be started here. Open the app in its own browser tab, or upload a video to try it right now.', true);
    }
  }
}
function stopWebcam(){ if(webcamStream){ webcamStream.getTracks().forEach(t=>t.stop()); webcamStream=null; } }
async function listCameras(){
  try{
    const devs = await navigator.mediaDevices.enumerateDevices();
    const cams = devs.filter(d=>d.kind==='videoinput');
    const sel = $('#camSel'); if(!sel||!cams.length) return;
    sel.innerHTML='';
    cams.forEach((c,i)=>{ const op=el('option',null,c.label||('Camera '+(i+1))); op.value=c.deviceId; sel.append(op); });
  }catch(e){}
}
$('#videoFile').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  $('#fname').textContent = f.name;
  $('#vidTransport').style.display='';
  state.mode='video';
  try{ if(CTRL.mode) CTRL.mode.sync(); switchMode(); }catch(err){}
  srcVideo.srcObject=null;
  srcVideo.src = URL.createObjectURL(f);
  srcVideo.loop = state.loop; srcVideo.playbackRate = state.speed;
  try{ srcVideo.currentTime = 0; }catch(err){}
  playing=true; logStart=performance.now(); updatePlayBtn();
  // The file picker is a user gesture, so start the transport immediately after selection.
  Promise.resolve(startEngine(false)).catch(()=>{});
  const startLoadedVideo = async ()=>{
    try{ srcVideo.currentTime = 0; }catch(err){}
    playing=true; logStart=performance.now(); updatePlayBtn();
    try{ await srcVideo.play(); }catch(err){ try{ await playSourceVideo(); }catch(e2){} }
  };
  srcVideo.addEventListener('loadedmetadata', startLoadedVideo, {once:true});
  try{ srcVideo.play(); }catch(err){}
  if(audioReady) prepareVideoAudio();
  srcVideo.load();
});
srcVideo.addEventListener('timeupdate', ()=>{
  const s = $('#scrub'); if(s && srcVideo.duration) s.value = (srcVideo.currentTime/srcVideo.duration)*1000;
});

/* ============================================================
   PROCESSING + RENDER LOOP
   ============================================================ */
const display = $('#display');
const dctx = display.getContext('2d');
const proc = document.createElement('canvas'); proc.width=PROC_W; proc.height=PROC_H;
const pctx = proc.getContext('2d', {willReadFrequently:true});
const paint = document.createElement('canvas'); paint.width=PROC_W; paint.height=PROC_H;
const paintCtx = paint.getContext('2d', {willReadFrequently:true});
paintCtx.fillStyle='#fff'; paintCtx.fillRect(0,0,PROC_W,PROC_H);

const waveCanvas = $('#wave');
const wctx = waveCanvas.getContext('2d');

let prevFrame=null;
let paintData = paintCtx.getImageData(0,0,PROC_W,PROC_H);
let blobsPrev=[];
let displayBlobs=[];   // persistent trackers that linger while the motion smear fades
let lastTrigger=0, pulseAcc=0;
const noteLog=[]; let logStart=0;

// Keep tracking squares on screen while the motion they marked is still fading,
// rather than blinking out the instant a blob stops being detected. Lifetime is
// tied to the Fade slider: slow fade = trackers linger longer.
function updateDisplayBlobs(blobs){
  const decay = 0.02 + (state.fade/100)*0.05;   // per-frame life loss
  for(const d of displayBlobs) d.life -= decay;
  for(const b of blobs){
    let best=null, bd=6400;
    for(const d of displayBlobs){ const dist=(b.cx-d.cx)**2+(b.cy-d.cy)**2; if(dist<bd){bd=dist;best=d;} }
    if(best){ best.cx=b.cx; best.cy=b.cy; best.size=b.size; best.id=b.id; best.life=1; }
    else displayBlobs.push({cx:b.cx, cy:b.cy, size:b.size, id:b.id, life:1});
  }
  displayBlobs = displayBlobs.filter(d=>d.life>0.02);
}

function resizeCanvases(){
  const A = (typeof ASPECTS!=='undefined' && ASPECTS[state.aspect]) ? ASPECTS[state.aspect] : {w:1920,h:1080};
  // full-resolution backing store (recorded/exported at this size); CSS scales it
  // down to fit the column, so the preview is a downsampled view of the same frame.
  display.width = A.w; display.height = A.h;
  display.style.aspectRatio = A.w + ' / ' + A.h;
  waveCanvas.width = waveCanvas.clientWidth || 600; waveCanvas.height = 46;
}
window.addEventListener('resize', resizeCanvases);

// drag inside the canvas to reframe the video when a non-16:9 crop is selected
(function enableReframe(){
  let dragging=false, px=0, py=0;
  const pt = e => (e.touches&&e.touches[0]) ? e.touches[0] : e;
  function down(e){ dragging=true; const p=pt(e); px=p.clientX; py=p.clientY; display.style.cursor='grabbing'; }
  function move(e){
    if(!dragging) return;
    const p=pt(e); const rect=display.getBoundingClientRect();
    if(!rect.width||!rect.height) return;
    const dx=(p.clientX-px)/rect.width, dy=(p.clientY-py)/rect.height;
    px=p.clientX; py=p.clientY;
    state.cropOffsetX = Math.max(0, Math.min(1, state.cropOffsetX - dx));
    state.cropOffsetY = Math.max(0, Math.min(1, state.cropOffsetY - dy));
    if(e.cancelable) e.preventDefault();
  }
  function up(){ dragging=false; display.style.cursor='grab'; }
  display.style.cursor='grab';
  display.addEventListener('mousedown', down); window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  display.addEventListener('touchstart', down, {passive:true}); window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', up);
})();

function processFrame(){
  if(srcVideo.readyState < 2 || !srcVideo.videoWidth){ return null; }
  // draw source into proc at 640x360 (cover)
  const vr = srcVideo.videoWidth/srcVideo.videoHeight, pr = PROC_W/PROC_H;
  let dw,dh,dx,dy;
  if(vr>pr){ dh=PROC_H; dw=PROC_H*vr; dx=(PROC_W-dw)/2; dy=0; }
  else { dw=PROC_W; dh=PROC_W/vr; dx=0; dy=(PROC_H-dh)/2; }
  pctx.drawImage(srcVideo, dx,dy,dw,dh);
  const cur = pctx.getImageData(0,0,PROC_W,PROC_H);
  const curD = cur.data;

  if(!prevFrame){ prevFrame = cur; return null; }
  const prevD = prevFrame.data;
  const pd = paintData.data;
  const mask = new Uint8Array(PROC_W*PROC_H);
  const thresh = state.sensitivity;
  const fade = state.fade/100; // 0..1 lerp toward white per frame
  let activeCount=0;

  for(let i=0,p=0;i<curD.length;i+=4,p++){
    const dr=Math.abs(curD[i]-prevD[i]), dg=Math.abs(curD[i+1]-prevD[i+1]), db=Math.abs(curD[i+2]-prevD[i+2]);
    const diff = (dr+dg+db)/3;
    // fade paint toward white
    pd[i]   += (255-pd[i])   * fade;
    pd[i+1] += (255-pd[i+1]) * fade;
    pd[i+2] += (255-pd[i+2]) * fade;
    if(diff > thresh){
      mask[p]=1; activeCount++;
      pd[i]=curD[i]; pd[i+1]=curD[i+1]; pd[i+2]=curD[i+2];
    }
  }
  paintCtx.putImageData(paintData,0,0);
  prevFrame = cur;

  // optional blur on paint (cheap, via canvas filter on render copy) handled at draw
  const blobs = detectBlobsColored(mask, cur, activeCount);
  return { blobs, activity: Math.min(1, activeCount/(PROC_W*PROC_H*0.12)) };
}

function detectBlobsColored(mask, frame, activeCount){
  const raw = detectBlobs(mask, PROC_W, PROC_H, state.scale, state.minBlob, state.maxBlobs);
  // attach average color by sampling frame at centroid neighbourhood
  const fd = frame.data;
  for(const b of raw){
    const cx = Math.min(PROC_W-1, Math.max(0, b.cx|0)), cy = Math.min(PROC_H-1, Math.max(0, b.cy|0));
    const idx = (cy*PROC_W+cx)*4;
    b.color = [fd[idx],fd[idx+1],fd[idx+2]];
  }
  return raw;
}

/* velocity tracking: match to previous blobs by nearest centroid */
function trackVelocity(blobs){
  for(const b of blobs){
    let best=null, bd=1e9;
    for(const p of blobsPrev){ const d=(b.cx-p.cx)**2+(b.cy-p.cy)**2; if(d<bd){bd=d;best=p;} }
    if(best && bd < 6400){ b.vx=b.cx-best.cx; b.vy=b.cy-best.cy; b.id=best.id; b.age=(best.age||0)+1; }
    else { b.vx=0; b.vy=0; b.id=Math.random(); b.age=0; }
    b.speed = Math.hypot(b.vx,b.vy);
  }
}

/* ---------- render overlays to display ---------- */
let renderQueueFlash=0;

function hasVideoFeed(){ return srcVideo.readyState>=2 && srcVideo.videoWidth>0; }

// place the 16:9 working scene into a WxH canvas of the chosen format.
// crop = cover the canvas (then pan by cropOffset); pad = contain (letterbox).
function cropRect(W,H){
  const sr=PROC_W/PROC_H, tr=W/H;
  let dw,dh;
  if(state.cropMode==='pad'){
    if(sr>tr){ dw=W; dh=W/sr; } else { dh=H; dw=H*sr; }
    return { dx:(W-dw)/2, dy:(H-dh)/2, dw, dh };
  }
  if(sr>tr){ dh=H; dw=H*sr; } else { dw=W; dh=W/sr; }
  const freeX=dw-W, freeY=dh-H;
  const ox=Math.max(0,Math.min(1,state.cropOffsetX)), oy=Math.max(0,Math.min(1,state.cropOffsetY));
  return { dx:-freeX*ox, dy:-freeY*oy, dw, dh };
}

function drawVideoInto(r){
  if(hasVideoFeed()){
    const vr=srcVideo.videoWidth/srcVideo.videoHeight, tr=PROC_W/PROC_H;
    let dw,dh,dx,dy;
    if(vr>tr){ dh=r.dh; dw=r.dh*vr; dx=r.dx+(r.dw-dw)/2; dy=r.dy; }
    else { dw=r.dw; dh=r.dw/vr; dx=r.dx; dy=r.dy+(r.dh-dh)/2; }
    dctx.imageSmoothingEnabled=true; dctx.drawImage(srcVideo, dx,dy,dw,dh);
  } else { dctx.fillStyle='#fff'; dctx.fillRect(r.dx,r.dy,r.dw,r.dh); }
}

// Base = the chosen background within the crop rect. Video + Motion both on
// composites the paint over the feed with 'multiply'. Mono desaturates the feed.
function drawBaseInto(r){
  const showVideo=state.layers.video, showPaint=state.layers.paint;
  dctx.save();
  const bw = state.bw ? 'grayscale(1) ' : '';
  if(state.bw) dctx.filter='grayscale(1)';
  if(showVideo && hasVideoFeed()){
    drawVideoInto(r);
    if(showPaint){
      dctx.globalCompositeOperation='multiply';
      dctx.filter = (bw + (state.blur>0?'blur('+(state.blur*0.6)+'px)':'')).trim() || 'none';
      dctx.drawImage(paint,0,0,PROC_W,PROC_H, r.dx,r.dy,r.dw,r.dh);
    }
  } else if(showPaint){
    dctx.filter = (bw + (state.blur>0?'blur('+(state.blur*0.6)+'px)':'')).trim() || 'none';
    dctx.drawImage(paint,0,0,PROC_W,PROC_H, r.dx,r.dy,r.dw,r.dh);
  } else if(showVideo){
    drawVideoInto(r);
  } else {
    dctx.fillStyle='#fff'; dctx.fillRect(r.dx,r.dy,r.dw,r.dh);
  }
  dctx.restore();
}

function caption(txt, x, y){
  dctx.font='9px "IBM Plex Mono", monospace';
  dctx.textBaseline='top';
  const w = dctx.measureText(txt).width;
  dctx.fillStyle='rgba(20,20,18,0.6)';
  dctx.fillRect(x-3, y-2, w+6, 13);
  dctx.fillStyle='#fff';
  dctx.fillText(txt, x, y);
}

function render(blobs){
  const W=display.width, H=display.height;
  dctx.clearRect(0,0,W,H);
  dctx.fillStyle='#fff'; dctx.fillRect(0,0,W,H);   // letterbox / idle background
  const r = cropRect(W,H);
  const ox=r.dx, oy=r.dy, sx=r.dw/PROC_W, sy=r.dh/PROC_H;

  if(state.split){
    const mid = Math.round(W/2);
    dctx.save();
    dctx.beginPath(); dctx.rect(0,0,mid,H); dctx.clip();
    drawBaseInto(r);
    drawOverlays(blobs, ox, oy, sx, sy);
    dctx.restore();

    dctx.save();
    dctx.beginPath(); dctx.rect(mid,0,W-mid,H); dctx.clip();
    dctx.save(); if(state.bw) dctx.filter='grayscale(1)'; drawVideoInto(r); dctx.restore();
    dctx.restore();

    dctx.strokeStyle='rgba(255,255,255,0.9)'; dctx.lineWidth=1;
    dctx.beginPath(); dctx.moveTo(mid,0); dctx.lineTo(mid,H); dctx.stroke();
    caption('PROCESSED', 8, 8);
    caption('SOURCE', mid+8, 8);
  } else {
    drawBaseInto(r);
    drawOverlays(blobs, ox, oy, sx, sy);
  }
  dctx.textBaseline='alphabetic';
}

function drawOverlays(blobs, ox, oy, sx, sy){
  const W=display.width, H=display.height;
  if(state.layers.grid){
    const overVideo = state.layers.video && hasVideoFeed();
    dctx.strokeStyle = overVideo ? 'rgba(255,255,255,0.10)' : 'rgba(0,0,0,0.06)';
    dctx.lineWidth=1;
    for(let gx=0; gx<=PROC_W; gx+=state.scale){ const X=ox+gx*sx; dctx.beginPath(); dctx.moveTo(X,0); dctx.lineTo(X,H); dctx.stroke(); }
    for(let gy=0; gy<=PROC_H; gy+=state.scale){ const Y=oy+gy*sy; dctx.beginPath(); dctx.moveTo(0,Y); dctx.lineTo(W,Y); dctx.stroke(); }
  }
  if(state.layers.lines && blobs.length>1) drawLines(blobs, ox, oy, sx, sy);
  if(state.layers.blobs) drawSquares(blobs, ox, oy, sx, sy);
}

function hexToRgba(hex, a){
  let h = String(hex||'#111111').replace('#','');
  if(h.length===3) h = h.split('').map(c=>c+c).join('');
  const n = parseInt(h,16);
  const r = (n>>16)&255, g=(n>>8)&255, b=n&255;
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function drawSquares(blobs, ox, oy, sx, sy){
  dctx.font='8px "IBM Plex Mono", monospace';
  dctx.textBaseline='top';
  blobs.forEach((b)=>{
    const cx=ox+b.cx*sx, cy=oy+b.cy*sy;
    const s = Math.min(140, Math.max(18, Math.sqrt(b.size)*sx*0.7));
    const half=s/2;
    const life = b.life==null?1:b.life;
    const a = Math.min(1, life*4);
    dctx.strokeStyle=hexToRgba(state.boxColor, a); dctx.lineWidth=2;
    dctx.strokeRect(cx-half, cy-half, s, s);
    const x01=b.cx/PROC_W, y01=b.cy/PROC_H;
    dctx.fillStyle=hexToRgba(state.boxColor, a);
    dctx.fillText(x01.toFixed(7), cx-half, cy+half+3);
    dctx.fillText(y01.toFixed(7), cx-half, cy+half+12);
  });
}

function drawLines(blobs, ox, oy, sx, sy){
  const tension = state.lineTension/100;
  const turb = state.lineTurbulence/100;
  const grav = state.lineGravity/100;
  const W=display.width,H=display.height;
  const cxg = W/2, cyg = H/2;
  const dens = state.lineDensity/100;
  const pairs=[];
  if(state.connection==='all' || dens>0.66){
    for(let i=0;i<blobs.length;i++) for(let j=i+1;j<blobs.length;j++) pairs.push([i,j]);
  } else {
    const extra = Math.round(dens*blobs.length);
    for(let i=0;i<blobs.length;i++){
      const dists = blobs.map((b,j)=>({j,d:(blobs[i].cx-b.cx)**2+(blobs[i].cy-b.cy)**2})).filter(o=>o.j!==i).sort((a,b)=>a.d-b.d);
      for(let k=0;k<Math.min(1+extra,dists.length);k++) pairs.push([i,dists[k].j]);
    }
  }
  const sqHalf = b => Math.min(140, Math.max(18, Math.sqrt(b.size)*sx*0.7))/2;
  function sidePoint(cx, cy, half, tx, ty){
    const dx=tx-cx, dy=ty-cy;
    if(Math.abs(dx) >= Math.abs(dy)) return { x: cx + Math.sign(dx||1)*half, y: cy };
    return { x: cx, y: cy + Math.sign(dy||1)*half };
  }
  for(const [i,j] of pairs){
    const a=blobs[i], b=blobs[j];
    const ax=ox+a.cx*sx, ay=oy+a.cy*sy, bx=ox+b.cx*sx, by=oy+b.cy*sy;
    const pa = sidePoint(ax, ay, sqHalf(a), bx, by);
    const pb = sidePoint(bx, by, sqHalf(b), ax, ay);
    const life = Math.min(a.life==null?1:a.life, b.life==null?1:b.life);
    const op = Math.min(0.9, Math.max(0, life*4) * 0.9);
    dctx.strokeStyle=hexToRgba(state.lineColor, op);
    dctx.lineWidth = state.lineWeight;
    dctx.beginPath();
    dctx.moveTo(pa.x, pa.y);
    let mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2;
    mx += (cxg-mx)*grav*0.5; my += (cyg-my)*grav*0.5;
    mx += (Math.random()*2-1)*turb*40; my += (Math.random()*2-1)*turb*40;
    if(tension>0.05){ dctx.quadraticCurveTo(mx, my, pb.x, pb.y); }
    else { dctx.lineTo(pb.x, pb.y); }
    dctx.stroke();
  }
  renderQueueFlash = Math.max(0, renderQueueFlash-0.06);
}

function drawWave(){
  if(!audioReady){ wctx.clearRect(0,0,waveCanvas.width,waveCanvas.height); return; }
  const buf = waveform.getValue();
  const W=waveCanvas.width,H=waveCanvas.height;
  wctx.clearRect(0,0,W,H);
  wctx.strokeStyle='#1A1A1A'; wctx.lineWidth=1; wctx.beginPath();
  for(let i=0;i<buf.length;i++){ const x=i/buf.length*W, y=(0.5-buf[i]*0.5)*H; i?wctx.lineTo(x,y):wctx.moveTo(x,y); }
  wctx.stroke();
}

/* ---------- main loop ---------- */
let lastT=performance.now();
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now(); const dt=(now-lastT)/1000; lastT=now;
  const feat = processFrame();
  if(feat){
    trackVelocity(feat.blobs);
    const agg = aggregateFeatures(feat);
    applyMappings(agg);
    updateConductor(agg, feat.blobs);
    directSonify(feat.blobs);
    updateDisplayBlobs(feat.blobs);
    render(displayBlobs);
    blobsPrev = feat.blobs.map(b=>({cx:b.cx,cy:b.cy,size:b.size,id:b.id,age:b.age}));
  } else {
    updateDisplayBlobs([]);
    render(displayBlobs);
  }
  drawWave();
}
function aggregateFeatures(feat){
  const b=feat.blobs;
  const n=b.length||1;
  const avgY = b.reduce((s,x)=>s+x.cy/PROC_H,0)/n;
  const avgX = b.reduce((s,x)=>s+x.cx/PROC_W,0)/n;
  const avgSize = Math.min(1, b.reduce((s,x)=>s+x.size,0)/n/3000);
  const avgVel = Math.min(1, b.reduce((s,x)=>s+(x.speed||0),0)/n/30);
  return { avgY, avgX, avgSize, avgVel, count:b.length, activity:feat.activity };
}

/* ---------- transport ---------- */
function updatePlayBtn(){
  const b=$('#playBtn');
  if(!b) return;
  b.textContent = 'Play';
  b.classList.toggle('playing', !!playing);
}
function hasLoadedVideo(){ return state.mode==='video' && !!srcVideo.src && !isNaN(srcVideo.duration); }
async function playSourceVideo(){ if(hasLoadedVideo()){ try{ await srcVideo.play(); }catch(e){} } }
function pauseSourceVideo(){ if(state.mode==='video' && srcVideo && !srcVideo.paused){ try{ srcVideo.pause(); }catch(e){} } }

// Starts the audio engine and begins live sonification. `auto` means the call
// was triggered by the camera/video coming on rather than an explicit tap, so
// if the browser blocks the AudioContext (no fresh user gesture) we arm a
// one-shot resume on the next interaction instead of failing silently.
async function startEngine(auto){
  if(!audioReady){ await initAudio(); await initMIDI(); Tone.Transport.bpm.value=state.tempo; Tone.Transport.start(); }
  try{ await Tone.start(); }catch(e){}
  if(Tone.context.state !== 'running'){
    if(auto) armAudioResume();
    return false;
  }
  if(!playing){ playing=true; logStart=performance.now(); if(state.midiClock) startClock(); }
  startArrangement(ME.prof || DEFAULT_TRACK);
  updatePlayBtn();
  return true;
}

let audioArmed=false;
function armAudioResume(){
  if(audioArmed) return; audioArmed=true;
  const resume = async () => {
    await startEngine(false);
    if(Tone.context.state === 'running'){
      window.removeEventListener('pointerdown', resume);
      window.removeEventListener('keydown', resume);
      window.removeEventListener('touchstart', resume);
      audioArmed=false;
    }
  };
  window.addEventListener('pointerdown', resume, {passive:true});
  window.addEventListener('keydown', resume);
  window.addEventListener('touchstart', resume, {passive:true});
}

async function togglePlay(){
  if(!audioReady || Tone.context.state !== 'running'){
    const ok = await startEngine(false); // first tap also begins playing
    if(ok){ playing=true; logStart=performance.now(); await playSourceVideo(); startArrangement(ME.prof || DEFAULT_TRACK); if(state.midiClock) startClock(); updatePlayBtn(); }
    return;
  }
  playing = !playing;
  if(playing){ logStart=performance.now(); await playSourceVideo(); startArrangement(ME.prof || DEFAULT_TRACK); if(state.midiClock) startClock(); }
  else { pauseSourceVideo(); stopClock(); }
  updatePlayBtn();
}
function stopAll(){
  playing=false; updatePlayBtn();
  pauseSourceVideo();
  stopClock();
  try{ if(synth && synth.releaseAll) synth.releaseAll(); }catch(e){}
  try{ if(ME.built && ME.inst.pad) ME.inst.pad.releaseAll(); }catch(e){}
  try{ if(ME.built && ME.inst.comp && ME.inst.comp.releaseAll) ME.inst.comp.releaseAll(); }catch(e){}
  try{ if(ME.built && ME.inst.leadKit){ ME.inst.leadKit.forEach(k=>{ try{ if(k.voice.releaseAll) k.voice.releaseAll(); }catch(e){} }); } }catch(e){}
  activeVoices=0;
}
function resetPaint(){
  if(hasLoadedVideo()){ try{ srcVideo.currentTime = 0; }catch(e){} }
  paintCtx.fillStyle='#fff'; paintCtx.fillRect(0,0,PROC_W,PROC_H);
  paintData = paintCtx.getImageData(0,0,PROC_W,PROC_H);
  prevFrame=null; blobsPrev=[]; displayBlobs=[]; noteLog.length=0;
}

/* ============================================================
   EXPORT: MIDI / WAV / VIDEO
   ============================================================ */
function ts(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return ''+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds()); }
function downloadBlob(blob, name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000); }

function exportMIDI(){
  if(!noteLog.length){ flash('#exMidi','No notes yet'); return; }
  const bytes = buildSMF(noteLog, 480, state.tempo);
  downloadBlob(new Blob([bytes],{type:'audio/midi'}), 'motion-midi-'+ts()+'.mid');
}

async function exportWAV(){
  if(!noteLog.length){ flash('#exWav','No notes yet'); return; }
  flash('#exWav','Rendering…');
  const dur = Math.max(2, noteLog[noteLog.length-1].time + 4);
  try{
    const buffer = await Tone.Offline(({transport})=>{
      const m = new Tone.Volume(volDb(state.volume)).toDestination();
      const rv = new Tone.Reverb({decay:Math.max(0.1,state.fx.reverb.decay), wet: state.fx.reverb.on?state.fx.reverb.wet/100:0}).connect(m);
      const dl = new Tone.FeedbackDelay(state.fx.delay.time, state.fx.delay.on?state.fx.delay.feedback/100:0); dl.wet.value = state.fx.delay.on?state.fx.delay.wet/100:0; dl.connect(rv);
      const flt = new Tone.Filter(state.fx.filter.on?state.fx.filter.cutoff:20000, state.fx.filter.on?state.fx.filter.type.toLowerCase():'lowpass'); flt.Q.value = state.fx.filter.on?state.fx.filter.resonance:0; flt.connect(dl);
      const made = makeSynthVoice(state.synth, state.attack/1000, state.release/1000);
      const s = made.voice;
      s.connect(flt);
      noteLog.forEach(n=>{ try{
        if(made.pitched) s.triggerAttackRelease(Tone.Frequency(n.pitch,'midi'), Math.max(0.05,n.duration), n.time, n.velocity/127);
        else s.triggerAttackRelease(Math.max(0.05,n.duration), n.time, n.velocity/127);
      }catch(e){} });
    }, dur, 2, 44100);
    const wav = audioBufferToWav(buffer);
    downloadBlob(new Blob([wav],{type:'audio/wav'}), 'motion-midi-'+ts()+'.wav');
    flash('#exWav','Export WAV');
  }catch(e){ flash('#exWav','Render failed'); }
}

function audioBufferToWav(buffer){
  const ch = buffer.numberOfChannels, sr = buffer.sampleRate, frames = buffer.length;
  const header = buildWavHeader(frames, sr, ch);
  const out = new Uint8Array(header.length + frames*ch*2);
  out.set(header,0);
  const dv = new DataView(out.buffer);
  const data = []; for(let c=0;c<ch;c++) data.push(buffer.getChannelData(c));
  let off=44;
  for(let i=0;i<frames;i++){
    for(let c=0;c<ch;c++){
      let s=Math.max(-1,Math.min(1,data[c][i]));
      dv.setInt16(off, s<0 ? s*0x8000 : s*0x7FFF, true); off+=2;
    }
  }
  return out;
}

let unifiedRecorder=null, unifiedChunks=[], unifiedAutoStop=null, unifiedRecordStart=0, unifiedProgressRAF=null, unifiedRecording=false, unifiedMuteState=null;

function selectedExportMode(){
  return { audio:!!state.exportAudio, video:!!state.exportVideo };
}
function preferredMime(includeVideo, includeAudio){
  if(includeVideo){
    if(includeAudio && MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')) return 'video/webm;codecs=vp9,opus';
    if(MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) return 'video/webm;codecs=vp9';
    return 'video/webm';
  }
  if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
  return 'audio/webm';
}
function exportFilename(includeVideo, includeAudio, mime){
  const ext = mime.indexOf('webm') !== -1 ? 'webm' : (includeVideo ? 'webm' : 'webm');
  const base = includeVideo ? 'motion-midi-video' : 'motion-midi-audio';
  const suffix = includeVideo ? '-' + state.aspect.replace(':','x') : '';
  const mix = includeVideo && includeAudio ? '-with-audio' : (includeVideo ? '-silent' : '');
  return base + suffix + mix + '-' + ts() + '.' + ext;
}
function setUnifiedProgress(p){
  const prog = $('#recProg');
  if(prog && prog.querySelector('i')) prog.querySelector('i').style.width = Math.min(100, Math.max(0,p*100))+'%';
}
function setUnifiedTimer(sec){
  const e=$('#recTimer');
  if(!e) return;
  const m=String(Math.floor(sec/60)).padStart(2,'0'), s=String(Math.floor(sec%60)).padStart(2,'0');
  e.innerHTML='<span class="live-dot'+(unifiedRecording?' rec':'')+'"></span>'+m+':'+s;
}
function muteLiveOutputForRecording(){
  unifiedMuteState = {
    dest: (monitorOut && monitorOut.volume) ? monitorOut.volume.value : null,
    video: videoAudioOutGain ? videoAudioOutGain.gain.value : null
  };
  try{ if(monitorOut && monitorOut.volume) monitorOut.volume.value = MUTE_DB; }catch(e){}
  try{ if(videoAudioOutGain) videoAudioOutGain.gain.value = 0; }catch(e){}
}
function restoreLiveOutputAfterRecording(){
  if(!unifiedMuteState) return;
  try{ if(unifiedMuteState.dest!=null && monitorOut && monitorOut.volume) monitorOut.volume.value = unifiedMuteState.dest; }catch(e){}
  try{ if(videoAudioOutGain) videoAudioOutGain.gain.value = unifiedMuteState.video==null ? (state.videoVolume||0)/100 : unifiedMuteState.video; }catch(e){}
  unifiedMuteState=null;
}
function finishUnifiedRecording(){
  clearTimeout(unifiedAutoStop);
  if(unifiedProgressRAF) cancelAnimationFrame(unifiedProgressRAF);
  unifiedProgressRAF=null;
  if(unifiedRecorder && unifiedRecorder.state !== 'inactive'){
    try{ unifiedRecorder.stop(); }catch(e){}
  }
}
async function recordAndExportSelected(btn){
  if(unifiedRecording){ finishUnifiedRecording(); return; }
  const mode = selectedExportMode();
  if(!mode.audio && !mode.video){ flash(btn,'Choose output'); return; }

  if(mode.audio){
    const ok = await startEngine(false);
    if(!ok || Tone.context.state!=='running'){ flash(btn,'Tap to enable audio'); return; }
    playing = true; logStart = performance.now(); startArrangement(ME.prof || DEFAULT_TRACK); applyStemVolumes(); updatePlayBtn();
  }
  if(mode.video || mode.audio){ await playSourceVideo(); }
  if(mode.audio){ prepareVideoAudio(); ensureExportAudioDestination(); applyStemVolumes(); if(master) master.volume.rampTo(volDb(state.volume), 0.02); }

  // Give the Tone graph one animation frame to settle after any slider changes before MediaRecorder samples it.
  if(mode.audio) await new Promise(r=>setTimeout(r,120));

  const stream = new MediaStream();
  if(mode.video){
    try{ display.captureStream(30).getVideoTracks().forEach(t=>stream.addTrack(t)); }
    catch(e){ flash(btn,'No video stream'); return; }
  }
  if(mode.audio){
    ensureExportAudioDestination();
    if(!streamDest || !streamDest.stream.getAudioTracks().length){ flash(btn,'No audio stream'); return; }
    const liveAudioTracks = streamDest.stream.getAudioTracks().filter(t=>t.readyState !== 'ended');
    if(!liveAudioTracks.length){ flash(btn,'No audio stream'); return; }
    liveAudioTracks.forEach(t=>{ t.enabled = true; const c = t.clone ? t.clone() : t; c.enabled = true; stream.addTrack(c); });
  }
  if(!stream.getTracks().length){ flash(btn,'No stream'); return; }

  const mime = preferredMime(mode.video, mode.audio);
  unifiedChunks=[];
  try{ unifiedRecorder = new MediaRecorder(stream, {mimeType:mime}); }
  catch(e){ try{ unifiedRecorder = new MediaRecorder(stream); }catch(err){ flash(btn,'Record failed'); return; } }
  unifiedRecorder.ondataavailable = e=>{ if(e.data && e.data.size) unifiedChunks.push(e.data); };
  unifiedRecorder.onstop = ()=>{
    unifiedRecording=false;
    restoreLiveOutputAfterRecording();
    if(btn) btn.textContent='Record + export';
    setUnifiedProgress(0); setUnifiedTimer(0);
    const blob = new Blob(unifiedChunks,{type:mime});
    if(blob.size) downloadBlob(blob, exportFilename(mode.video, mode.audio, mime));
    try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){}
  };

  await new Promise(r=>setTimeout(r,80));
  muteLiveOutputForRecording();
  unifiedRecording=true;
  unifiedRecordStart=performance.now();
  if(btn) btn.textContent='Stop + export';
  setUnifiedTimer(0); setUnifiedProgress(0);
  unifiedRecorder.start(100);
  const dur = state._recordDur || 20;
  const tick = ()=>{
    if(!unifiedRecording) return;
    const elapsed=(performance.now()-unifiedRecordStart)/1000;
    setUnifiedTimer(elapsed); setUnifiedProgress(elapsed/dur);
    unifiedProgressRAF=requestAnimationFrame(tick);
  };
  tick();
  unifiedAutoStop=setTimeout(finishUnifiedRecording, dur*1000);
}

/* live session record + aspect-ratio video export */
let mediaRecorder=null, recChunks=[], recTimer=null, recStart=0, recording=false;
function startRecord(targetCanvas, fps){
  recChunks=[];
  const vStream = targetCanvas.captureStream(fps||30);
  const merged = new MediaStream();
  vStream.getVideoTracks().forEach(t=>merged.addTrack(t));
  if(streamDest) streamDest.stream.getAudioTracks().forEach(t=>merged.addTrack(t));
  const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus') ? 'video/webm;codecs=vp9,opus' : 'video/webm';
  mediaRecorder = new MediaRecorder(merged, {mimeType:mime});
  mediaRecorder.ondataavailable = e=>{ if(e.data.size) recChunks.push(e.data); };
  mediaRecorder.start(100);
  recording=true; recStart=performance.now();
  recTimer=setInterval(()=>{ const t=(performance.now()-recStart)/1000; const m=String(Math.floor(t/60)).padStart(2,'0'),s=String(Math.floor(t%60)).padStart(2,'0'); const e=$('#recTimer'); if(e) e.textContent=m+':'+s; },250);
}
function stopRecord(cb){
  if(!mediaRecorder) return;
  mediaRecorder.onstop = ()=>{ recording=false; clearInterval(recTimer); cb(new Blob(recChunks,{type:'video/webm'})); };
  mediaRecorder.stop();
}

/* Recording the display canvas captures it at its native backing resolution, so
   the recorded session is the full-resolution export. No separate re-render. */
let recAutoStop=null;

function flash(sel,txt){ const b=(typeof sel==='string')?$(sel):sel; if(!b) return; const o=b.dataset.label||b.textContent; b.dataset.label=o; b.textContent=txt; setTimeout(()=>{b.textContent=o;},1400); }


function buildMidiExport(body){
  const midiBtn = el('button','flat','Export MIDI');
  midiBtn.id='exMidi';
  midiBtn.style.width='100%';
  midiBtn.onclick=exportMIDI;
  body.append(midiBtn);
}

function buildExport(body){
  buildVideoExport(body);
  body.append(el('div',null,'<div style="height:1px;border-top:1px solid var(--hair);margin:14px 0 12px"></div>'));
  body.append(el('div','ctl-label','<span>Audio levels</span>'));
  body.append(rangeCtl('Generated audio','volume',0,100,1,v=>v+'%'));
  body.append(rangeCtl('Original video sound','videoVolume',0,100,1,v=>v+'%'));
  body.append(el('div','note','These levels affect live playback and any export that includes audio.'));

  body.append(el('div',null,'<div style="height:1px;border-top:1px solid var(--hair);margin:14px 0 12px"></div>'));
  body.append(el('div','ctl-label','<span>Final export contains</span>'));
  const choice = el('div','export-choice');
  choice.append(chk('Audio','exportAudio'), chk('Video','exportVideo'));
  body.append(choice);
  body.append(rangeCtl2('Record duration','recordDur',5,120,1,20,v=>v+' s'));

  const timer = el('div','rectimer'); timer.id='recTimer'; timer.style.margin='8px 0';
  timer.innerHTML='<span class="live-dot"></span>00:00';
  const prog = el('div','progress show'); prog.id='recProg'; prog.append(el('i'));
  body.append(timer, prog);

  const recBtn = el('button','flat primary','Record + export');
  recBtn.id='recExportBtn'; recBtn.style.width='100%'; recBtn.style.marginTop='10px';
  recBtn.onclick=()=>recordAndExportSelected(recBtn);
  body.append(recBtn);
  buildMidiExport(body);
  body.append(el('div','note','Choose audio, video, or both. One duration and one button are used for all recorded exports.'));

}

function buildVideoExport(body){
  // FORMAT (also reshapes the preview canvas so you frame to the export ratio)
  body.append(el('div','ctl-label','<span>Format</span>'));
  const row = el('div','rectrow');
  const shapes = {'16:9':[26,15],'9:16':[15,26],'1:1':[20,20],'4:5':[18,22],'2:1':[28,14]};
  Object.keys(ASPECTS).forEach(r=>{
    const btn = el('button', r===state.aspect?'on':'');
    const ic = el('span','ic'); ic.style.width=shapes[r][0]+'px'; ic.style.height=shapes[r][1]+'px';
    btn.append(ic, el('span',null,r));
    btn.onclick = ()=>{ state.aspect=r; state.cropOffsetX=0.5; state.cropOffsetY=0.5; [...row.children].forEach(c=>c.classList.remove('on')); btn.classList.add('on'); resizeCanvases(); };
    row.append(btn);
  });
  body.append(row);
  body.append(toggleCtl('Fit','cropMode','Crop','Pad','crop','pad'));
}
function rangeCtl2(label,key,min,max,step,def,fmt){
  state['_'+key]=def;
  const wrap=el('div','ctl'); const lab=el('div','ctl-label'); const val=el('span','ctl-val');
  lab.append(el('span',null,label),val);
  const inp=el('input'); inp.type='range'; inp.min=min;inp.max=max;inp.step=step;inp.value=def;
  const r=v=>val.textContent=fmt?fmt(v):v; r(def);
  inp.addEventListener('input',()=>{ state['_'+key]=parseFloat(inp.value); r(inp.value); });
  wrap.append(lab,inp); return wrap;
}

/* ---------- layer toggles ---------- */
$('#layerRow').addEventListener('click', e=>{
  const btn = e.target.closest('button'); if(!btn || btn.disabled) return;
  if(btn.hasAttribute('data-split')){
    state.split = !state.split;
    btn.classList.toggle('on', state.split);
    return;
  }
  if(btn.hasAttribute('data-bw')){
    state.bw = !state.bw;
    btn.classList.toggle('on', state.bw);
    return;
  }
  const layer = btn.dataset.layer;
  if(!layer) return;
  state.layers[layer] = !state.layers[layer];
  btn.classList.toggle('on', state.layers[layer]);
});

/* ---------- boot ---------- */
buildSections();
resizeCanvases();
switchMode();
requestAnimationFrame(loop);

})();
